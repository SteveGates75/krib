<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Join Screen */
        #join-screen {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #3d3d3d;
            border: 1px solid #4d4d4d;
            border-radius: 5px;
            color: white;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        .input-group input::placeholder {
            color: #888;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .primary {
            background: #007bff;
            color: white;
        }

        .primary:hover {
            background: #0056b3;
        }

        .secondary {
            background: #28a745;
            color: white;
        }

        .secondary:hover {
            background: #1e7e34;
        }

        .status {
            text-align: center;
            color: #888;
            font-size: 14px;
            padding: 10px;
            background: #3d3d3d;
            border-radius: 5px;
        }

        /* Main App */
        #main-app {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            background: #1a1a1a;
        }

        #main-app.active {
            display: flex;
        }

        /* Top Bar */
        .top-bar {
            background: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #4d4d4d;
        }

        .room-badge {
            background: #3d3d3d;
            padding: 8px 15px;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }

        .copy-btn {
            background: #3d3d3d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            margin-left: 10px;
            cursor: pointer;
        }

        .leave-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Main Grid */
        .main-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 300px;
            overflow: hidden;
        }

        /* Video Grid */
        .video-grid {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            overflow-y: auto;
        }

        .video-container {
            background: #2d2d2d;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        /* Chat */
        .chat-section {
            background: #2d2d2d;
            border-left: 1px solid #4d4d4d;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #4d4d4d;
            color: white;
        }

        .users-list {
            padding: 10px 15px;
            border-bottom: 1px solid #4d4d4d;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .user-badge {
            background: #3d3d3d;
            color: #888;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .user-badge.online {
            color: #28a745;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            background: #3d3d3d;
            padding: 10px;
            border-radius: 5px;
            max-width: 80%;
        }

        .message.own {
            background: #007bff;
            align-self: flex-end;
        }

        .message .sender {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 3px;
        }

        .message.own .sender {
            color: #fff;
        }

        .message .text {
            color: white;
            font-size: 13px;
        }

        .message .time {
            font-size: 9px;
            color: #aaa;
            margin-top: 3px;
            text-align: right;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid #4d4d4d;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            background: #3d3d3d;
            border: 1px solid #4d4d4d;
            border-radius: 5px;
            color: white;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #007bff;
        }

        .chat-input button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Control Bar */
        .control-bar {
            background: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid #4d4d4d;
        }

        .control-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 100px;
        }

        .control-btn.active {
            background: #007bff;
            color: white;
        }

        .control-btn.inactive {
            background: #dc3545;
            color: white;
        }

        /* Brave Browser Warning */
        .brave-warning {
            background: #ffc107;
            color: #000;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }

        .brave-warning.show {
            display: block;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .chat-section {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Join Screen -->
    <div id="join-screen">
        <h1>🎥 Video Chat</h1>
        
        <div class="brave-warning" id="brave-warning">
            ⚠️ Using Brave? Click the Brave icon in address bar and disable Shields for this site to enable camera/mic.
        </div>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Your name" autocomplete="off">
        </div>
        
        <div class="input-group">
            <input type="text" id="room-id" placeholder="Room ID" autocomplete="off">
        </div>
        
        <div class="button-group">
            <button class="primary" onclick="joinRoom()">Join Room</button>
            <button class="secondary" onclick="createRoom()">New Room</button>
        </div>
        
        <div class="status" id="connection-status">
            🔴 Disconnected
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app">
        <div class="top-bar">
            <div>
                <span class="room-badge" id="room-display">Room: </span>
                <button class="copy-btn" onclick="copyRoomId()">Copy Room ID</button>
            </div>
            <button class="leave-btn" onclick="leaveRoom()">Leave Room</button>
        </div>

        <div class="main-grid">
            <!-- Videos -->
            <div class="video-grid" id="video-grid">
                <!-- Videos will be added here -->
            </div>

            <!-- Chat -->
            <div class="chat-section">
                <div class="chat-header">
                    <strong>Chat</strong> · <span id="user-count">0</span> online
                </div>
                
                <div class="users-list" id="users-list"></div>
                
                <div class="chat-messages" id="chat-messages"></div>
                
                <div class="chat-input">
                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="control-bar">
            <button class="control-btn active" id="audio-btn" onclick="toggleAudio()">
                🎤 Mute
            </button>
            <button class="control-btn active" id="video-btn" onclick="toggleVideo()">
                📹 Stop Video
            </button>
            <button class="control-btn" id="screen-btn" onclick="toggleScreenShare()">
                🖥️ Share Screen
            </button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
