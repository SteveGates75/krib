<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Video Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            height: 100vh;
        }
        
        /* Join Screen */
        #join-screen {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: #2d2d2d;
            border-radius: 10px;
        }
        
        h1 { text-align: center; margin-bottom: 20px; }
        
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        
        input {
            background: #3d3d3d;
            color: white;
        }
        
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        .secondary {
            background: #28a745;
        }
        
        .secondary:hover {
            background: #1e7e34;
        }
        
        #connection-status {
            margin-top: 10px;
            padding: 10px;
            background: #3d3d3d;
            border-radius: 5px;
            text-align: center;
        }
        
        /* Main App */
        #main-app {
            height: 100vh;
            display: none;
            flex-direction: column;
        }
        
        /* Top Bar */
        .top-bar {
            background: #2d2d2d;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .room-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .room-id {
            background: #3d3d3d;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .copy-btn {
            padding: 5px 15px;
            background: #3d3d3d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .leave-btn {
            padding: 5px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        /* Main Grid */
        .main-grid {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        /* Video Section */
        .video-section {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #1a1a1a;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
        }
        
        .video-container {
            background: #2d2d2d;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
        
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
        
        /* Chat Section */
        .chat-section {
            width: 300px;
            background: #2d2d2d;
            border-left: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #3d3d3d;
        }
        
        .users-list {
            padding: 10px 15px;
            border-bottom: 1px solid #3d3d3d;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .user-badge {
            background: #3d3d3d;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        
        .message {
            background: #3d3d3d;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            max-width: 80%;
        }
        
        .message.own {
            background: #007bff;
            margin-left: auto;
        }
        
        .sender {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 3px;
        }
        
        .text {
            font-size: 14px;
            word-break: break-word;
        }
        
        .time {
            font-size: 9px;
            color: #aaa;
            margin-top: 3px;
            text-align: right;
        }
        
        .chat-input {
            padding: 15px;
            border-top: 1px solid #3d3d3d;
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 8px;
            background: #3d3d3d;
            border: 1px solid #4d4d4d;
            border-radius: 5px;
            color: white;
        }
        
        .chat-input button {
            width: auto;
            padding: 8px 15px;
            margin: 0;
        }
        
        /* Control Bar */
        .control-bar {
            background: #2d2d2d;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-top: 1px solid #3d3d3d;
        }
        
        .control-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .control-btn.active {
            background: #007bff;
            color: white;
        }
        
        .control-btn.inactive {
            background: #dc3545;
            color: white;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .chat-section {
                display: none;
            }
            
            .video-grid {
                grid-template-columns: 1fr;
            }
            
            .control-btn span {
                display: none;
            }
            
            .control-btn {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Join Screen -->
    <div id="join-screen">
        <h1>📹 Simple Video Chat</h1>
        
        <input type="text" id="username" placeholder="Your name" autocomplete="off">
        <input type="text" id="room" placeholder="Room ID" autocomplete="off">
        
        <button onclick="joinRoom()">Join Room</button>
        <button class="secondary" onclick="createRoom()">Create New Room</button>
        
        <div id="connection-status">🔴 Disconnected</div>
    </div>

    <!-- Main App -->
    <div id="main-app">
        <div class="top-bar">
            <div class="room-info">
                <span class="room-id" id="room-display">Room: </span>
                <button class="copy-btn" onclick="copyRoomId()">Copy ID</button>
            </div>
            <button class="leave-btn" onclick="leaveRoom()">Leave</button>
        </div>

        <div class="main-grid">
            <!-- Videos -->
            <div class="video-section">
                <div class="video-grid" id="video-grid"></div>
            </div>

            <!-- Chat -->
            <div class="chat-section">
                <div class="chat-header">
                    <strong>Chat</strong> · <span id="user-count">0</span> online
                </div>
                
                <div class="users-list" id="users-list"></div>
                
                <div class="chat-messages" id="chat-messages"></div>
                
                <div class="chat-input">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="control-bar">
            <button class="control-btn active" id="audio-btn" onclick="toggleAudio()">
                🎤 <span>Mute</span>
            </button>
            <button class="control-btn active" id="video-btn" onclick="toggleVideo()">
                📹 <span>Stop Video</span>
            </button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
