<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Chat · Laptop & Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Join Screen */
        #join-screen {
            background: #1e293b;
            padding: clamp(20px, 5vw, 40px);
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        h1 {
            color: white;
            font-size: clamp(24px, 6vw, 32px);
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 30px;
            font-size: clamp(12px, 3vw, 14px);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: clamp(12px, 3vw, 16px);
            background: #334155;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
            font-size: clamp(14px, 4vw, 16px);
            -webkit-appearance: none;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .input-group input::placeholder {
            color: #94a3b8;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .button-group button {
            flex: 1;
            min-width: 120px;
            padding: clamp(12px, 3vw, 16px);
            border: none;
            border-radius: 12px;
            font-size: clamp(14px, 4vw, 16px);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .primary-btn {
            background: #3b82f6;
            color: white;
        }

        .primary-btn:hover {
            background: #2563eb;
        }

        .secondary-btn {
            background: #10b981;
            color: white;
        }

        .secondary-btn:hover {
            background: #059669;
        }

        .status {
            text-align: center;
            color: #94a3b8;
            font-size: clamp(12px, 3vw, 14px);
            padding: 12px;
            background: #334155;
            border-radius: 12px;
        }

        /* Main App */
        #main-app {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            background: #0f172a;
        }

        #main-app.active {
            display: flex;
        }

        /* Top Bar */
        .top-bar {
            background: #1e293b;
            padding: clamp(10px, 2vw, 16px) clamp(15px, 3vw, 24px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap;
            gap: 10px;
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .room-badge {
            background: #334155;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: clamp(12px, 3vw, 14px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: clamp(12px, 3vw, 14px);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            -webkit-tap-highlight-color: transparent;
        }

        .leave-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: clamp(12px, 3vw, 14px);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .connection-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #10b981;
            font-size: clamp(12px, 3vw, 14px);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Video Grid */
        .video-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: clamp(10px, 2vw, 16px);
            padding: clamp(10px, 2vw, 16px);
            overflow-y: auto;
            background: #0f172a;
        }

        .video-container {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: clamp(11px, 2.5vw, 12px);
            backdrop-filter: blur(4px);
        }

        /* Mobile Chat Toggle */
        .chat-toggle {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #3b82f6;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            z-index: 100;
            cursor: pointer;
            border: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Chat Panel */
        .chat-panel {
            width: 300px;
            background: #1e293b;
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #334155;
        }

        .chat-header h3 {
            color: white;
            font-size: clamp(14px, 3vw, 16px);
            margin-bottom: 10px;
        }

        .users-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .user-badge {
            background: #334155;
            color: #94a3b8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .user-badge.online::before {
            content: "";
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            background: #334155;
            padding: 10px 15px;
            border-radius: 16px;
            max-width: 85%;
            align-self: flex-start;
        }

        .message.own {
            background: #3b82f6;
            align-self: flex-end;
        }

        .message .sender {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .message.own .sender {
            color: #bfdbfe;
        }

        .message .text {
            color: white;
            font-size: 13px;
            word-break: break-word;
        }

        .message .time {
            font-size: 9px;
            color: #94a3b8;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input {
            padding: 20px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            -webkit-appearance: none;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .chat-input button {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: #3b82f6;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* Control Bar */
        .control-bar {
            background: #1e293b;
            padding: clamp(10px, 2vw, 16px);
            display: flex;
            justify-content: center;
            gap: clamp(10px, 2vw, 15px);
            border-top: 1px solid #334155;
            flex-wrap: wrap;
        }

        .control-btn {
            background: #334155;
            color: white;
            border: none;
            padding: clamp(10px, 2vw, 12px) clamp(15px, 3vw, 25px);
            border-radius: 30px;
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            min-width: 100px;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn.active {
            background: #3b82f6;
        }

        .control-btn.inactive {
            background: #ef4444;
        }

        /* Responsive Layout */
        .desktop-layout {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .mobile-layout {
            display: none;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Mobile Styles */
        @media (max-width: 768px) {
            .desktop-layout {
                display: none;
            }

            .mobile-layout {
                display: flex;
                flex-direction: column;
            }

            .video-grid {
                grid-template-columns: 1fr;
                padding-bottom: 70px;
            }

            .video-container {
                max-height: 40vh;
            }

            .chat-toggle {
                display: flex;
            }

            .chat-panel {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: 85%;
                max-width: 350px;
                transform: translateX(100%);
                z-index: 1000;
                box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
            }

            .chat-panel.open {
                transform: translateX(0);
            }

            .control-bar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: #1e293b;
                padding: 10px;
                z-index: 90;
            }

            .control-btn {
                min-width: auto;
                padding: 12px;
                flex: 1;
            }

            .control-btn span {
                display: none;
            }

            .control-btn i {
                font-size: 20px;
            }

            .room-badge {
                max-width: 150px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
        }

        /* Small phones */
        @media (max-width: 380px) {
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .room-info {
                justify-content: center;
            }

            .button-group button {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Join Screen -->
    <div id="join-screen">
        <h1>📱 Video Chat</h1>
        <div class="subtitle">Works on laptop & mobile</div>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Your name" autocomplete="off">
        </div>
        
        <div class="input-group">
            <input type="text" id="room-id" placeholder="Room ID" autocomplete="off">
        </div>
        
        <div class="button-group">
            <button class="primary-btn" onclick="joinRoom()">Join Room</button>
            <button class="secondary-btn" onclick="createRoom()">Create Room</button>
        </div>
        
        <div class="status" id="connection-status">
            🔴 Disconnected
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app">
        <!-- Desktop Layout -->
        <div class="desktop-layout" id="desktop-layout">
            <!-- Top Bar -->
            <div style="width: 100%; position: fixed; top: 0; z-index: 10;">
                <div class="top-bar">
                    <div class="room-info">
                        <span class="room-badge" id="room-display">Room: </span>
                        <button class="copy-btn" onclick="copyRoomId()">📋 Copy</button>
                    </div>
                    
                    <div class="connection-badge">
                        <span>🟢</span>
                        <span>Connected</span>
                    </div>
                    
                    <button class="leave-btn" onclick="leaveRoom()">Leave</button>
                </div>
            </div>

            <div style="display: flex; height: 100%; width: 100%; padding-top: 60px;">
                <!-- Videos -->
                <div style="flex: 1;">
                    <div class="video-grid" id="video-grid-desktop"></div>
                </div>

                <!-- Chat -->
                <div class="chat-panel">
                    <div class="chat-header">
                        <h3>💬 Chat</h3>
                        <div class="users-list" id="users-list-desktop"></div>
                    </div>
                    
                    <div class="chat-messages" id="chat-messages-desktop"></div>
                    
                    <div class="chat-input">
                        <input type="text" id="message-input-desktop" placeholder="Type a message...">
                        <button onclick="sendMessage('desktop')">📤</button>
                    </div>
                </div>
            </div>

            <!-- Control Bar -->
            <div style="position: fixed; bottom: 0; width: 100%;">
                <div class="control-bar">
                    <button class="control-btn active" id="audio-btn-desktop" onclick="toggleAudio()">
                        🎤 <span>Mute</span>
                    </button>
                    <button class="control-btn active" id="video-btn-desktop" onclick="toggleVideo()">
                        📹 <span>Stop Video</span>
                    </button>
                    <button class="control-btn" id="screen-btn-desktop" onclick="toggleScreenShare()">
                        🖥️ <span>Share Screen</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Layout -->
        <div class="mobile-layout" id="mobile-layout">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="room-info">
                    <span class="room-badge" id="room-display-mobile">Room: </span>
                    <button class="copy-btn" onclick="copyRoomId()">📋</button>
                </div>
                <button class="leave-btn" onclick="leaveRoom()">Leave</button>
            </div>

            <!-- Videos -->
            <div class="video-grid" id="video-grid-mobile"></div>

            <!-- Chat Toggle Button -->
            <button class="chat-toggle" onclick="toggleChat()">💬</button>

            <!-- Chat Panel -->
            <div class="chat-panel" id="mobile-chat">
                <div class="chat-header">
                    <h3>💬 Chat</h3>
                    <div class="users-list" id="users-list-mobile"></div>
                </div>
                
                <div class="chat-messages" id="chat-messages-mobile"></div>
                
                <div class="chat-input">
                    <input type="text" id="message-input-mobile" placeholder="Type a message...">
                    <button onclick="sendMessage('mobile')">📤</button>
                </div>
            </div>

            <!-- Control Bar -->
            <div class="control-bar">
                <button class="control-btn active" id="audio-btn-mobile" onclick="toggleAudio()">
                    🎤
                </button>
                <button class="control-btn active" id="video-btn-mobile" onclick="toggleVideo()">
                    📹
                </button>
                <button class="control-btn" id="screen-btn-mobile" onclick="toggleScreenShare()">
                    🖥️
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
